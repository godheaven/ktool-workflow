version: '3.8'
services:
  app:
    build: .
    ports:
      - "8082:8082"
    volumes:
      - ./data:/data
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/data/ktool-workflow-db
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
