<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="mainLayout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ktool-workflow | Business Excellence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #f8fafc;
            --bg-card: #ffffff;
            --bg-card-hover: #f1f5f9;
            --border-color: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent: #4f46e5;
            --accent-light: #818cf8;
            --danger: #ef4444;
        }

        .topbar-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 4px 12px;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.2s;
        }

        .topbar-profile:hover {
            background: rgba(124, 58, 237, 0.1);
        }

        .profile-dropdown-menu {
            width: 320px;
            padding: 16px;
            border-radius: 20px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-top: 10px !important;
        }

        .profile-menu-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 20px;
            text-align: center;
        }

        .avatar-container {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e2e8f0;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-placeholder {
            color: white;
            font-weight: 700;
        }

        .avatar-large {
            width: 80px !important;
            height: 80px !important;
            font-size: 32px !important;
            margin-bottom: 12px;
        }

        .profile-menu-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 2px;
        }

        .profile-menu-email {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 8px;
        }

        .profile-menu-role {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 10px;
            background: rgba(124, 58, 237, 0.15);
            color: #a78bfa;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .profile-menu-footer {
            border-top: 1px solid #e2e8f0;
            padding-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-logout-menu {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #0f172a;
            background: transparent;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            cursor: pointer;
            width: 100%;
            justify-content: center;
        }

        .btn-logout-menu:hover {
            background: rgba(248, 81, 73, 0.1);
            color: #f85149;
            border-color: rgba(248, 81, 73, 0.3);
        }

        /* Override Tailwind for dropdown */
        .dropdown-toggle::after {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="sidebar flex-shrink-0 flex flex-col border-r border-gray-800">
            <div class="h-16 flex items-center justify-center border-b border-gray-800" style="background-color: var(--sidebar-bg)">
                <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <nav class="flex-1 overflow-y-auto" style="background-color: var(--sidebar-bg)">
                <a th:href="@{/}" class="sidebar-item" th:classappend="${currentUri == '/' ? 'active' : ''}">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    <span>Home</span>
                </a>
                <a href="#" class="sidebar-item">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <span>Search</span>
                </a>
                <a th:href="@{/tasks}" class="sidebar-item" th:classappend="${currentUri.startsWith('/tasks') ? 'active' : ''}">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                    <span>Intray</span>
                </a>
                <a href="#" class="sidebar-item">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <span>Requests</span>
                </a>
                <a th:href="@{/workflows}" class="sidebar-item" th:classappend="${currentUri.startsWith('/workflows') ? 'active' : ''}">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    <span>Workflows</span>
                </a>
                <a th:href="@{/instances}" class="sidebar-item" th:classappend="${currentUri.startsWith('/instances') ? 'active' : ''}">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <span>Reports</span>
                </a>
                
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <!-- Topbar -->
            <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 z-10">
                <div></div>
                <div class="flex items-center space-x-4">
                    <button class="flex flex-col items-center text-gray-500 hover:text-gray-900 transition-colors">
                        <i class="bi bi-question-circle text-xl"></i>
                        <span class="text-[10px] font-bold mt-0.5">Help</span>
                    </button>
                    <button class="flex flex-col items-center text-gray-500 hover:text-gray-900 transition-colors">
                        <i class="bi bi-globe text-xl"></i>
                        <span class="text-[10px] font-bold mt-0.5">English</span>
                    </button>
                    <button class="flex flex-col items-center text-gray-500 hover:text-gray-900 transition-colors">
                        <i class="bi bi-chat-left-dots text-xl"></i>
                        <span class="text-[10px] font-bold mt-0.5">Feedback</span>
                    </button>
                    <div class="h-10 w-px bg-gray-200 mx-2"></div>
                    
                    <div class="dropdown" sec:authorize="isAuthenticated()">
                        <div class="topbar-profile dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                            <div class="avatar-container">
                                <img th:if="${avatarUrl != null and avatarUrl != ''}" th:src="${avatarUrl}" class="avatar-img" alt="User Avatar">
                                <div th:if="${avatarUrl == null or avatarUrl == ''}" class="avatar-placeholder" th:text="${displayName != null ? displayName.substring(0, 1).toUpperCase() : 'U'}">U</div>
                            </div>
                            <div class="flex items-center ml-2 hidden sm:flex">
                                <span class="text-xs font-bold text-gray-900" th:text="${displayName}">User Name</span>
                                <i class="bi bi-chevron-down ml-1 text-[10px] text-gray-400"></i>
                            </div>
                        </div>
                        <div class="dropdown-menu dropdown-menu-end profile-dropdown-menu">
                            <div class="profile-menu-header">
                                <div class="avatar-container avatar-large mx-auto mb-3">
                                    <img th:if="${avatarUrl != null and avatarUrl != ''}" th:src="${avatarUrl}" class="avatar-img" alt="User Avatar">
                                    <div th:if="${avatarUrl == null or avatarUrl == ''}" class="avatar-placeholder" th:text="${displayName != null ? displayName.substring(0, 1).toUpperCase() : 'U'}">U</div>
                                </div>
                                <div class="profile-menu-name" th:text="${displayName}">User Name</div>
                                <div class="profile-menu-email" th:text="${userEmail}">user@example.com</div>
                                <div class="profile-menu-role" th:text="${userRole}">ROLE</div>
                            </div>
                            <div class="profile-menu-footer">
                                <form th:action="@{/logout}" method="POST" class="w-full m-0">
                                    <button type="submit" class="btn-logout-menu">
                                        <i class="bi bi-box-arrow-right"></i>
                                        <span>Logout</span>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="flex-1 overflow-y-auto p-8 bg-gray-50">
                <div th:replace="${content}"></div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
