<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: mainLayout(~{::content})}">
<head>
    <title>Dynamic Form Test</title>
</head>
<body>
    <div th:fragment="content">
        <div class="container py-4">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="card-title mb-0" th:text="${form.name}">Dynamic Form</h5>
                        <p class="text-muted small mb-0" th:text="${form.description}">Metadata-driven rendering demonstration.</p>
                    </div>
                    <span id="autosave-status" class="badge bg-success d-none">Saved</span>
                </div>
                <div class="card-body">
                    <form id="dynamic-workflow-form">
                        <!-- Sections rendering -->
                        <div th:each="section : ${form.sections}" class="mb-5">
                            <h6 class="border-bottom pb-2 mb-4 text-primary">
                                <i th:if="${section.icon}" th:class="${section.icon} + ' me-2'"></i>
                                <span th:text="${section.label}">Section</span>
                            </h6>
                            
                            <div class="row">
                                <th:block th:each="field : ${form.fields}" 
                                          th:if="${field.sectionKey == section.key}">
                                    <div class="col-md-6">
                                        <div th:replace="~{form/form-fields :: fieldRenderer(${field})}"></div>
                                    </div>
                                </th:block>
                            </div>
                        </div>

                        <!-- Unsectioned fields -->
                        <div class="row">
                            <th:block th:each="field : ${form.fields}" 
                                      th:if="${field.sectionKey == null or field.sectionKey == ''}">
                                <div class="col-md-6">
                                    <div th:replace="~{form/form-fields :: fieldRenderer(${field})}"></div>
                                </div>
                            </th:block>
                        </div>

                        <div class="mt-4 pt-3 border-top d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-light">Save Draft</button>
                            <button type="submit" class="btn btn-primary">Submit Form</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Inject Form Runtime -->
        <script src="/js/form-runtime.js"></script>
    </div>
</body>
</html>
