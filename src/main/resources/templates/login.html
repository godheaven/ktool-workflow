<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ktool-workflow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden p-10">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-slate-900">ktool <span class="text-indigo-600">workflow</span></h1>
            <p class="text-slate-500 mt-2">Sign in to manage your business flows</p>
        </div>

        <form th:action="@{/login}" method="post" class="space-y-6">
            <div th:if="${param.error}" class="p-4 bg-red-50 text-red-700 text-sm rounded-xl border border-red-100">
                Invalid username or password.
            </div>
            <div th:if="${param.logout}" class="p-4 bg-emerald-50 text-emerald-700 text-sm rounded-xl border border-emerald-100">
                You have been signed out.
            </div>

            <div>
                <label for="username" class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
                <input type="text" id="username" name="username" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none"
                    placeholder="Enter your username">
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none"
                    placeholder="••••••••">
            </div>

            <button type="submit" 
                class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-200 transition-all transform active:scale-[0.98]">
                Sign In
            </button>
        </form>

        <div class="mt-10 text-center text-sm text-slate-400">
            &copy; 2026 Kanopus Workflow Platform
        </div>
    </div>
</body>
</html>
